<!-- ==========================================

<script>
// 全域變數：儲存從試算表抓回來的全部活動，以及目前的展開狀態
let allFetchedEvents = [];
let isEventsExpanded = false;

// ------------------------------------------
// 📝 頁面載入基礎設定
// ------------------------------------------
window.addEventListener('load', () => {
  const placeholders = [
    "想來點什麼呢",
    "這裡也可以輸入年份考古",
    "期待下次現場相見(✪ω✪)"
  ];
  const searchBox = document.getElementById('searchBox');
  if (searchBox) {
    const randomIndex = Math.floor(Math.random() * placeholders.length);
    searchBox.placeholder = placeholders[randomIndex];
    searchBox.value = ""; 
  }
  
  const resultsContainer = document.getElementById("results");
  if (resultsContainer) resultsContainer.innerHTML = "";
  
  initTags();
  
  const lastMod = new Date(document.lastModified);
  const formattedDate = lastMod.getFullYear() + '/' + 
                        (lastMod.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                        lastMod.getDate().toString().padStart(2, '0');
  document.getElementById('last-mod').textContent = formattedDate;
});

// ------------------------------------------
// 🎪 活動行事曆邏輯 (串接 Google Sheet API)
// ------------------------------------------
(function() {
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK7dY0rEBbjgvHRtwbwCVYBomcTyW0GO3_1gp5tB_QOC3H9mH4zPxisiYAMTeSbgD_F1kXi8goTGsm/pub?gid=0&single=true&output=csv";

  function parseCSV(text) {
    const lines = text.trim().split("\n");
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
    return lines.slice(1).map(line => {
      const cols = []; let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i]; if (ch === '"') { inQ = !inQ; continue; }
        if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; continue; }
        cur += ch;
      }
      cols.push(cur.trim()); const obj = {};
      headers.forEach((h, i) => { obj[h] = (cols[i] || "").replace(/^"|"$/g, ""); });
      return obj;
    }).filter(ev => ev.date && ev.name);
  }

  fetch(CSV_URL)
    .then(r => r.text())
    .then(text => {
      allFetchedEvents = parseCSV(text);
      const toggleBtn = document.getElementById("toggle-events-btn");
      if (allFetchedEvents.length > 5) {
        toggleBtn.style.display = "block";
      } else {
        toggleBtn.style.display = "none";
      }
      renderEventsList(allFetchedEvents, false);
    })
    .catch(() => {
      const el = document.getElementById("event-list");
      if (el) el.innerHTML = '<p class="event-empty">資料載入失敗，請重新整理網頁 📋</p>';
    });
})();

// 渲染活動畫面的獨立函式
function renderEventsList(events, expandAll) {
  const el = document.getElementById("event-list");
  if (!events.length) {
    el.innerHTML = '<p class="event-empty">目前沒有近期活動，敬請期待 🌟</p>';
    return;
  }

  const WEEKDAYS = ["日","一","二","三","四","五","六"];
  const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  
  const displayEvents = expandAll ? events : events.slice(0, 5);

  el.innerHTML = displayEvents.map(ev => {
    const d = new Date(ev.date + "T00:00:00");
    const df = { month: MONTHS[d.getMonth()], day: d.getDate(), weekday: "週" + WEEKDAYS[d.getDay()] };
    
    const isSelling = ev.status === "售票中"; 
    const isSoldOut = ev.status === "完售";
    const hasTicket = ev.ticketUrl && ev.ticketUrl.trim() !== "";
    
    let badgeClass = "soon", badgeText = ev.status || "即將開賣";
    if (isSelling) { badgeClass = "selling"; badgeText = "售票中"; }
    if (isSoldOut) { badgeClass = "soldout"; badgeText = "完售"; }
    
    // 🌟 邏輯調整：
    // 如果是「售票中」，右側按鈕顯示「立即購票」
    // 如果是「完售」，右側按鈕改顯示「活動詳情」
    let actionClass = "wait", actionText = "未開賣";
    if (isSelling && hasTicket) { actionClass = "buy"; actionText = "立即購票"; }
    else if (isSoldOut) { actionClass = "sold-out"; actionText = "活動詳情"; }

    const inner = `
      <div class="event-date-box">
        <span class="event-date-month">${df.month}</span>
        <span class="event-date-day">${df.day}</span>
        <span class="event-date-weekday">${df.weekday}</span>
      </div>
      <div class="event-info">
        <div class="event-name-row">
          <span class="event-name">${ev.name}</span>
          <span class="event-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="event-meta">
          ${ev.time ? `<span>🕐 ${ev.time}</span>` : ""}
          ${ev.venue ? `<span>📍 ${ev.venue}</span>` : ""}
        </div>
      </div>
      <div class="event-action ${actionClass}">${actionText}</div>
    `;
    
    // 🌟 修改點：只要有網址（不論是售票中或是完售），都渲染成可點擊跳轉的 <a> 標籤
    if (hasTicket && (isSelling || isSoldOut)) { 
      return `<a class="event-card" href="${ev.ticketUrl}" target="_blank" rel="noopener">${inner}</a>`; 
    } else { 
      return `<div class="event-card disabled">${inner}</div>`; 
    }
  }).join("");
}

function toggleEventsDisplay() {
  const toggleBtn = document.getElementById("toggle-events-btn");
  isEventsExpanded = !isEventsExpanded;
  
  if (isEventsExpanded) {
    renderEventsList(allFetchedEvents, true);
    toggleBtn.innerHTML = "收合 ▲";
  } else {
    renderEventsList(allFetchedEvents, false);
    toggleBtn.innerHTML = "展開 ▼";
    document.querySelector('.event-section').scrollIntoView({ behavior: 'smooth' });
  }
}

// 補足占位 Stub 程式碼（請保留您原本完整的影片與音樂資料邏輯）
function initTags() { }
function closeLyrics() { document.getElementById('lyricsOverlay').classList.remove('active'); }
// ------------------------------------------
// 🎵 音樂作品區塊與歌詞 Popup 邏輯
// ------------------------------------------
const musicData = [
      {"title": "錄音室版《明天初老的我不在你的眼裡》",
    "imgUrl": "https://cdn.phototourl.com/free/2026-05-20-760be36e-9359-42bb-9f3a-1b70f8792554.png",
    "url": "https://open.spotify.com/album/5GKkbdBNVSOxYotEhEweU2" },
  {

// 渲染音樂作品區塊的邏輯（已升級：支援 YouTube 嵌入與純文字連結雙模式）
function renderMusic() {
  const musicList = document.getElementById("music-list");
  if (!musicList) return;
  
  if (!musicData || musicData.length === 0) {
    musicList.innerHTML = '<p style="color:#888; font-size:13px;">音樂作品籌備中 🎸</p>';
    return;
  }
  
  musicList.innerHTML = musicData.map((song, idx) => {
   // 💡 模式 A：如果是純文字連結卡片 (有 url 且沒有 ytId)
if (song.url && !song.ytId) {
  return `
    <a href="${song.url}" target="_blank" rel="noopener" class="music-card-link" style="text-decoration: none; color: inherit; display: block;">
      <div class="music-card" style="cursor: pointer;">
        <div>
          <!-- 標題 -->
          <div class="music-title">${song.title}</div>
          
          <!-- 📱 嵌入圖片區 -->
          <div style="position: relative; width: 100%; height: 0; padding-bottom: 56.25%; border-radius: 8px; overflow: hidden; background: #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            ${song.imgUrl ? 
              `<img src="${song.imgUrl}" alt="${song.title}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border: 0;">` :
              `<div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 13px;">📷 尚未設定圖片 (請填寫 imgUrl)</div>`
            }
          </div>
        </div>
        <!-- 💡 歌詞/說明按鈕已在此模式下成功移除 ⛔ -->
      </div>
    </a>
      `;
    }
    
    // 💡 模式 B：原本的 YouTube 影音播放卡片
    return `
      <div class="music-card" style="text-decoration: none; cursor: default;">
        <div>
          <div class="music-title">${song.title}</div>
          <div style="position: relative; width: 100%; height: 0; padding-bottom: 56.25%; margin-bottom: 12px; border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <iframe 
              style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
              src="https://www.youtube.com/embed/${song.ytId}" 
              title="${song.title}" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
              allowfullscreen>
            </iframe>
          </div>
        </div>
        <button class="lyrics-btn" onclick="openLyrics(${idx})">📝 查看歌詞</button>
      </div>
    `;
  }).join("");
}

function openLyrics(index) {
  const song = musicData[index];
  if (!song) return;
  document.getElementById("popupLyricsTitle").textContent = song.title;
  document.getElementById("popupLyricsBody").textContent = song.lyrics || "目前暫無提供歌詞 📝";
  document.getElementById("lyricsOverlay").classList.add("active");
}

function closeLyrics() {
  document.getElementById("lyricsOverlay").classList.remove("active");
}

// 執行音樂渲染
renderMusic();

let gaSearchTimer; 

function search(keyword) {
  if (!keyword || !keyword.trim()) return [];
  const cleanedKeyword = keyword.trim();
  const keywords = cleanedKeyword.toLowerCase().split(/\s+/).filter(k => k.length > 0);

  const results = data.map(item => {
    let reasons = [];
    const title = item.title.toLowerCase();
    const text = (item.text || "").toLowerCase();
    const tags = (item.tags || []).join(" ").toLowerCase();

    keywords.forEach(k => {
      if (title.includes(k)) reasons.push("標題");
      if (tags.includes(k)) reasons.push("標籤");
      if (text.includes(k)) reasons.push("內容");
    });
    if (reasons.length > 0) { return { ...item, reasons: [...new Set(reasons)] }; }
    return null;
  }).filter(Boolean);

  clearTimeout(gaSearchTimer);
  gaSearchTimer = setTimeout(() => {
    if (typeof gtag === 'function' && cleanedKeyword.length > 0) {
      gtag('event', 'view_search_results', { search_term: cleanedKeyword });
    }
  }, 1000); 
  return results;
}

function highlight(text, keywords) {
  if (!keywords.length) return text;
  let result = text;
  keywords.forEach(k => {
    if (!k) return;
    const escaped = k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(`(${escaped})`, "gi");
    result = result.replace(regex, `<span class="highlight">$1</span>`);
  });
  return result;
}

function render(results, keyword) {
  const container = document.getElementById("results");
  container.innerHTML = "";
  const keywords = keyword.toLowerCase().split(/\s+/).filter(Boolean);

  if (results.length === 0) {
    container.innerHTML = "<p>找不到結果 😶‍🌫️</p>";
    if (typeof gtag === 'function' && keyword && keyword.trim().length > 0) {
      gtag('event', 'search_no_results', { 'search_term': keyword.trim() });
    }
    return;
  }

  results.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = item.isMemberOnly ? "card member-only" : "card";

    const titleHtml = highlight(item.title, keywords);
    const snippetHtml = highlight(item.text || "", keywords);
    const reasonHtml = `<div class="reason-badge">🔍 命中：${item.reasons.join(" / ")}</div>`;

    if (item.isMemberOnly) {
      const btnId = `join-member-btn-${index}`;
      const joinMemberUrl = "https://www.youtube.com/channel/UCshG6fS9S77wX86D7O0AunA/join";
      div.innerHTML = `
        <div class="member-badge">👑 會員專屬</div>
        <h3><a href="${item.url}" target="_blank"><span style="color:#d4af37; font-size:16px; margin-right:4px;">🔒</span>${titleHtml}</a></h3>
        ${reasonHtml}
        <p>${snippetHtml}</p>
        <div><a href="${joinMemberUrl}" target="_blank" class="member-btn" id="${btnId}">加入會員解鎖 ➜</a></div>
      `;
      setTimeout(() => {
        const btn = document.getElementById(btnId);
        if (btn) {
          btn.addEventListener('click', function() {
            if (typeof gtag === 'function') { gtag('event', 'click_join_membership', { 'video_title': item.title }); }
          });
        }
      }, 0);
    } else {
      div.innerHTML = `
        <h3><a href="${item.url}" target="_blank">${titleHtml}</a></h3>
        ${reasonHtml}
        <p>${snippetHtml}</p>
      `;
    }
    container.appendChild(div);
  });
}

// 🌟🌟🌟 【這裡開始是修改的重點區】 🌟🌟🌟
let isComposing = false; // 追蹤是否正在輸入注音組字中
const searchBoxElement = document.getElementById("searchBox");

if (searchBoxElement) {
  // 監聽注音開始輸入
  searchBoxElement.addEventListener('compositionstart', () => {
    isComposing = true;
  });

  // 監聽注音選字完成
  searchBoxElement.addEventListener('compositionend', (e) => {
    isComposing = false;
    triggerSearch(e.target.value); // 選完字手動觸發搜尋
  });

  // 修改原本的 input 監聽器
  searchBoxElement.addEventListener("input", (e) => {
    if (isComposing) return; // 如果還在打注音，直接攔截！不送 GA、不刷新畫面
    triggerSearch(e.target.value);
  });

  // 監聽鍵盤 Enter 鍵
  searchBoxElement.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const keyword = e.target.value.trim();
      if (keyword.length === 0) { e.preventDefault(); alert("請輸入搜尋關鍵字！"); }
    }
  });
}

// 統一負責處理搜尋與防呆的函式
function triggerSearch(rawValue) {
  const keyword = rawValue.trim();
  
  if (rawValue.length > 0 && keyword.length === 0) {
    document.getElementById("results").innerHTML = "<p style='color: #888;'>請輸入有效文字 🔍</p>"; 
    return;
  }
  
  if (!keyword) { 
    document.getElementById("results").innerHTML = ""; 
    return; 
  }

  // 額外防呆：如果因為不可抗力誤入「純注音字」，攔截不執行搜尋、不送 GA
  const bopomofoRegex = /^[\u3105-\u312F\u02CA\u02C7\u02CB\u02D9\s]+$/;
  if (bopomofoRegex.test(keyword)) {
    document.getElementById("results").innerHTML = "<p>找不到結果 😶‍🌫️</p>";
    return;
  }

  // 執行原本的搜尋與渲染邏輯
  const results = search(keyword); 
  render(results, keyword);
}

function quickSearch(tag) {
  if (!tag || !tag.trim()) return;
  const cleanedTag = tag.trim().replace(/^#/, '');
  const searchBox = document.getElementById("searchBox");
  searchBox.value = cleanedTag; 
  if (typeof gtag === 'function') { gtag('event', 'search_tag_click', { 'tag_name': `#${cleanedTag}` }); }
  const results = search(cleanedTag); render(results, cleanedTag);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function initTags() {
  const tagCloud = document.getElementById("tag-cloud");
  if (!tagCloud) return;
  tagCloud.innerHTML = ""; 
  const priorityTags = ["會員專屬"];
  const allTagsFromData = data.flatMap(item => item.tags || []);
  const otherTags = [...new Set(allTagsFromData)].filter(tag => !priorityTags.includes(tag));
  const randomSupplement = otherTags.sort(() => 0.5 - Math.random()).slice(0, 5);
  const finalTags = [...priorityTags, ...randomSupplement];

  finalTags.forEach(tag => {
    const btn = document.createElement("button"); btn.className = "tag-btn"; btn.innerText = `#${tag}`;
    btn.onclick = () => quickSearch(tag); tagCloud.appendChild(btn);
  });
}
</script>

</body>
</html>
