<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影片各類排行榜</title>
    <style>
        /* 保持原本所有的 CSS 樣式與結構 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 30px 5%; background: #f8f9fa; color: #333; margin: 0; display: flex; justify-content: center; }
        .rank-container { width: 100%; max-width: 900px; }
        h1 { font-size: 24px; font-weight: bold; color: #1a1a1a; margin-bottom: 20px; text-align: center; }
        .filter-tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .tab-btn { padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.6); color: #6d5c4b; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(225,212,196,0.9), rgba(198,181,160,0.9)); color: #524335; }
        .loading { text-align: center; font-size: 14px; color: #888; padding: 40px; }
        .rank-list { list-style: none; padding: 0; margin: 0; }
        .rank-item { display: flex; align-items: center; padding: 20px; margin-bottom: 16px; background: white; border-radius: 14px; border: 1px solid #eaeaea; }
        .rank-number { font-size: 18px; font-weight: bold; width: 32px; color: #a0a0a0; }
        .rank-item:nth-child(1) .rank-number { color: #d4af37; font-size: 24px; }
        .rank-thumbnail { width: 120px; height: 68px; object-fit: cover; border-radius: 8px; margin-right: 18px; flex-shrink: 0; }
        .rank-info { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; }
        .rank-title { margin: 0 0 8px 0; font-size: 16px; }
        .rank-title a { text-decoration: none; color: #1a1a1a; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .rank-views { display: inline-block; font-size: 12px; color: #666; background: #f2f2f2; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
        footer { font-size: 12px; color: #999999; text-align: center; padding: 40px 0 20px 0; line-height: 1.6; }
        @media (max-width: 600px) { body { padding: 12px; } h1 { font-size: 20px; } .rank-item { padding: 10px; } .rank-thumbnail { width: 96px; height: 54px; margin-right: 10px; } .rank-title { font-size: 13.5px; } }
    </style>
</head>
<body>

<div class="rank-container">
    <h1>🏅 影片各類排行榜🏅 </h1>
    
    <div class="filter-tabs" id="filterTabs" style="display: none;">
        <!-- 保留原本所有的標籤，並在第一位新增「🎵 金曲榜」 -->
        <button class="tab-btn active" onclick="switchSort('songs')">🎵 金曲榜</button>
        <button class="tab-btn" onclick="switchSort('views')">🔥 觀看最多</button>
        <button class="tab-btn" onclick="switchSort('likes')">👍 按讚最多</button>
        <button class="tab-btn" onclick="switchSort('comments')">💬 留言最多</button>
        <button class="tab-btn" onclick="switchSort('engagement')">❤️ 互動率最高</button>
        <button class="tab-btn" onclick="switchSort('shorts')">📱 shorts觀看最多</button>
    </div>
    
    <div id="loading" class="loading">正在讀取最新排行榜數據...</div>
    <ul id="rankList" class="rank-list"></ul>

    <footer id="footerStatus">
        由 GitHub Actions 每日自動更新榜單👾
    </footer>
</div>

<script>
    // 建立快取，避免重複呼叫 json 檔案
    let cachedVideosData = null;
    let cachedSongsData = null;
    let cachedUpdateTime = '';

    let currentSortType = 'songs'; // 預設改為顯示金曲榜

    function formatNumber(num) { return parseInt(num).toLocaleString('zh-TW'); }

    function renderList() {
        const listEl = document.getElementById('rankList');
        listEl.innerHTML = '';
        
        let displayItems = [];

        // --------------------------------------------------
        // 分流 1：處理新擴充的「🎵 金曲榜」資料 (來自 song_rank.json)
        // --------------------------------------------------
        if (currentSortType === 'songs') {
            if (!cachedSongsData) return;
            // 後端已經幫我們做好觀看數排序，直接取前 15 名
            displayItems = cachedSongsData.slice(0, 15).map(song => {
                const mainVideoId = song.relatedVideoIds && song.relatedVideoIds.length > 0 ? song.relatedVideoIds[0] : '';
                return {
                    id: mainVideoId,
                    title: song.title,
                    thumbnail: song.thumbnail,
                    badgeText: `🔥 歌曲總觀看：${formatNumber(song.views)} 次`
                };
            });
        } 
        // --------------------------------------------------
        // 分流 2：處理原本的單一影片排行資料 (來自 rank.json)
        // --------------------------------------------------
        else {
            if (!cachedVideosData) return;
            let displayVideos = [];

            if (currentSortType === 'shorts') {
                displayVideos = cachedVideosData.filter(v => v.durationSeconds <= 60).sort((a, b) => b.views - a.views);
            } else {
                let longVideos = cachedVideosData.filter(v => v.durationSeconds > 60);
                if (currentSortType === 'engagement') {
                    // 維持你原本的 10000 次觀看限制條件
                    displayVideos = longVideos.filter(v => v.views >= 10000).sort((a, b) => b.engagement - a.engagement);
                } else {
                    displayVideos = longVideos.sort((a, b) => b[currentSortType] - a[currentSortType]);
                }
            }

            displayItems = displayVideos.slice(0, 15).map(video => {
                let badgeText = '';
                if (currentSortType === 'views' || currentSortType === 'shorts') badgeText = `🔥 觀看次數：${formatNumber(video.views)} 次`;
                if (currentSortType === 'likes') badgeText = `👍 按讚次數：${formatNumber(video.likes)} 次`;
                if (currentSortType === 'comments') badgeText = `💬 留言數量：${formatNumber(video.comments)} 則`;
                if (currentSortType === 'engagement') badgeText = `❤️ 粉絲互動率：${video.engagement.toFixed(2)}%`;

                return {
                    id: video.id,
                    title: video.title,
                    thumbnail: video.thumbnail,
                    badgeText: badgeText
                };
            });
        }

        // 渲染 DOM
        displayItems.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'rank-item';
            li.innerHTML = `
                <div class="rank-number">${index + 1}</div>
                <img class="rank-thumbnail" src="${item.thumbnail}" alt="${item.title}">
                <div class="rank-info">
                    <h3 class="rank-title"><a href="https://www.youtube.com/watch?v=${item.id}" target="_blank">${item.title}</a></h3>
                    <div class="rank-views">${item.badgeText}</div>
                </div>
            `;
            listEl.appendChild(li);
        });

        // 更新更新時間
        const timeString = new Date(cachedUpdateTime).toLocaleString('zh-TW');
        document.getElementById('footerStatus').innerHTML = `© 由 GitHub Actions 每日自動更新<br><span style="color: #b3b3b3;">資料更新時間：${timeString}</span>`;
    }

    async function switchSort(type) {
        currentSortType = type;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (event && event.target) {
            event.target.classList.add('active');
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('rankList').innerHTML = '';

        try {
            if (type === 'songs') {
                if (!cachedSongsData) {
                    const res = await fetch('song_rank.json');
                    const data = await res.json();
                    cachedSongsData = data.songs;
                    cachedUpdateTime = data.updateTime;
                }
            } else {
                if (!cachedVideosData) {
                    const res = await fetch('rank.json');
                    const data = await res.json();
                    cachedVideosData = data.videos;
                    cachedUpdateTime = data.updateTime;
                }
            }
            document.getElementById('loading').style.display = 'none';
            renderList();
        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerHTML = '<span style="color:#ff4d4d;">無法讀取該榜單數據，請確認 JSON 是否已在後台生成。</span>';
        }
    }

    // 初始化頁面
    async function init() {
        try {
            // 預設一進來直接讀取新版歌曲排行榜 (song_rank.json)
            const res = await fetch('song_rank.json');
            const data = await res.json();
            
            cachedSongsData = data.songs;
            cachedUpdateTime = data.updateTime;
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('filterTabs').style.display = 'flex';
            
            renderList();
        } catch (error) {
            console.error("嘗試讀取歌曲排行榜失敗，正切換至預設影片排行...", error);
            // 備用防呆：如果 song_rank.json 還不存在，自動跳轉載入傳統觀看排行
            switchSort('views');
        }
    }

    init();
</script>
</body>
</html>
